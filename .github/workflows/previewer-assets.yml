name: Previewer Assets

on:
  push:
    branches: [main]
    paths:
      - "src/NetPdf.Previewer.App/**"
      - "src/NetPdf.Previewer/**"
      - "src/NetPdf/**"
      - ".github/workflows/previewer-assets.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/NetPdf.Previewer.App/**"
      - "src/NetPdf.Previewer/**"
      - "src/NetPdf/**"
      - ".github/workflows/previewer-assets.yml"
  workflow_dispatch:

jobs:
  build-previewer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Publish self-contained previewer (${{ matrix.rid }})
        run: >
          dotnet publish src/NetPdf.Previewer.App -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}
      - name: Upload previewer binaries
        uses: actions/upload-artifact@v4
        with:
          name: netpdf-previewer-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}
          if-no-files-found: error
