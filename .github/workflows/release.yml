name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: build artifacts only, never create a Release (overrides publish_release)."
        type: boolean
        default: true
      publish_release:
        description: "Create a GitHub Release from this run (only when dry_run is unchecked). Requires 'tag'."
        type: boolean
        default: false
      tag:
        description: "Tag/name for the manually-published Release (e.g. v1.2.3). Required when publish_release is checked."
        type: string
        default: ""

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Pack NetPdfKit
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ "$INPUT_TAG" == v* ]]; then
            VERSION="${INPUT_TAG#v}"
          else
            VERSION="0.0.0-dispatch"
          fi
          dotnet pack src/NetPdf -c Release -p:Version="$VERSION" -o out
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            out/*.nupkg
            out/*.snupkg
          if-no-files-found: error

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Install DocFX
        run: dotnet tool update -g docfx
      - name: Build documentation
        run: docfx docs/docfx.json
      - name: Zip docs site
        run: |
          cd docs/_site
          zip -r "$GITHUB_WORKSPACE/docs-site.zip" .
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs-site.zip
          if-no-files-found: error

  previewer:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - name: Publish self-contained previewer (${{ matrix.rid }})
        run: >
          dotnet publish src/NetPdf.Previewer.App -c Release -f net10.0 -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}
      - name: Zip previewer binaries
        shell: bash
        run: |
          cd publish/${{ matrix.rid }}
          7z a "$GITHUB_WORKSPACE/netpdf-previewer-${{ matrix.rid }}.zip" .
      - name: Upload previewer artifact
        uses: actions/upload-artifact@v4
        with:
          name: previewer-${{ matrix.rid }}
          path: netpdf-previewer-${{ matrix.rid }}.zip
          if-no-files-found: error

  release:
    needs: [pack, docs, previewer]
    # Publish on a v* tag push, or on a manual dispatch that explicitly
    # opts in (dry_run unchecked AND publish_release checked).
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' &&
       !inputs.dry_run && inputs.publish_release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve release tag
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$IS_TAG" == "true" ]]; then
            RELEASE_TAG="$REF_NAME"
          else
            RELEASE_TAG="$INPUT_TAG"
          fi
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "::error::No release tag available. Provide the 'tag' input when publishing via dispatch." >&2
            exit 1
          fi
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" artifacts/* \
            --title "$RELEASE_TAG" \
            --generate-notes
